<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraNova</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f0f7ee}
.header{background:#2d5a1b;color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.3em}
.btn{background:#2d5a1b;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:1em}
.btn-outline{background:white;color:#2d5a1b;border:2px solid #2d5a1b;padding:8px 16px;border-radius:8px;cursor:pointer}
.page{display:none;padding:20px}
.page.active{display:block}
.card{background:white;border-radius:10px;padding:15px;margin:10px 0;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
input,textarea,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:8px;font-size:1em}
.hero{background:#2d5a1b;color:white;padding:40px 20px;text-align:center}
.hero h2{font-size:1.8em;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.badge{background:#e8f5e9;color:#2d5a1b;padding:4px 10px;border-radius:20px;font-size:0.85em}
.badge-red{background:#ffebee;color:#c62828}
</style>
</head>
<body>

<div class="header">
  <h1>🌍 TerraNova</h1>
  <div id="nav-buttons">
    <button class="btn-outline" style="color:white;border-color:white;margin-right:5px" onclick="showPage('connexion')">Connexion</button>
    <button class="btn" style="background:white;color:#2d5a1b" onclick="showPage('publier')">Publier</button>
  </div>
</div>

<!-- PAGE ACCUEIL -->
<div id="page-accueil" class="page active">
  <div class="hero">
    <h2>Trouvez votre terrain idéal</h2>
    <p>Achetez, vendez et louez des terrains en Côte d'Ivoire</p>
    <br>
    <button class="btn" style="background:white;color:#2d5a1b;font-size:1.1em;padding:12px 30px" onclick="showPage('annonces')">Voir les annonces</button>
  </div>
  <div style="padding:20px">
    <h3 style="color:#2d5a1b;margin-bottom:15px">Annonces récentes</h3>
    <div id="annonces-accueil"></div>
  </div>
</div>

<!-- PAGE ANNONCES -->
<div id="page-annonces" class="page">
  <div style="padding:15px">
    <h2 style="color:#2d5a1b;margin-bottom:15px">📋 Toutes les annonces</h2>
    <input type="text" placeholder="🔍 Rechercher..." oninput="rechercher(this.value)">
    <div id="liste-annonces"></div>
  </div>
</div>

<!-- PAGE CONNEXION -->
<div id="page-connexion" class="page">
  <div class="card" style="max-width:400px;margin:30px auto">
    <h2 style="color:#2d5a1b;margin-bottom:20px;text-align:center">🔐 Connexion</h2>
    <input type="email" id="email-login" placeholder="Email">
    <input type="password" id="password-login" placeholder="Mot de passe">
    <button class="btn" style="width:100%;margin-top:10px" onclick="connecter()">Se connecter</button>
    <p style="text-align:center;margin-top:15px">Pas de compte ? <a href="#" onclick="showPage('inscription')" style="color:#2d5a1b">S'inscrire</a></p>
  </div>
</div>

<!-- PAGE INSCRIPTION -->
<div id="page-inscription" class="page">
  <div class="card" style="max-width:400px;margin:30px auto">
    <h2 style="color:#2d5a1b;margin-bottom:20px;text-align:center">📝 Inscription</h2>
    <input type="text" id="nom-inscription" placeholder="Nom complet">
    <input type="email" id="email-inscription" placeholder="Email">
    <input type="password" id="password-inscription" placeholder="Mot de passe">
    <button class="btn" style="width:100%;margin-top:10px" onclick="inscrire()">Créer mon compte</button>
  </div>
</div>

<!-- PAGE PUBLIER -->
<div id="page-publier" class="page">
  <div class="card" style="max-width:500px;margin:20px auto">
    <h2 style="color:#2d5a1b;margin-bottom:20px">➕ Publier une annonce</h2>
    <input type="text" id="titre-annonce" placeholder="Titre de l'annonce">
    <input type="text" id="lieu-annonce" placeholder="Lieu (ex: Cocody, Abidjan)">
    <input type="number" id="prix-annonce" placeholder="Prix en FCFA">
    <input type="number" id="surface-annonce" placeholder="Surface en m²">
    <select id="type-annonce">
      <option value="vente">Vente</option>
      <option value="location">Location</option>
    </select>
    <textarea id="desc-annonce" placeholder="Description..." rows="3"></textarea>
    <button class="btn" style="width:100%;margin-top:10px" onclick="publierAnnonce()">Publier</button>
  </div>
</div>

<!-- PAGE PROFIL -->
<div id="page-profil" class="page">
  <div class="card" style="max-width:400px;margin:30px auto;text-align:center">
    <div style="font-size:3em">👤</div>
    <h2 id="profil-nom" style="color:#2d5a1b;margin:10px 0"></h2>
    <p id="profil-email" style="color:#666"></p>
    <br>
    <button class="btn" onclick="showPage('mes-annonces')">Mes annonces</button>
    <br><br>
    <button class="btn-outline" onclick="deconnecter()">Se déconnecter</button>
  </div>
</div>

<!-- PAGE MES ANNONCES -->
<div id="page-mes-annonces" class="page">
  <div style="padding:15px">
    <h2 style="color:#2d5a1b;margin-bottom:15px">📌 Mes annonces</h2>
    <div id="mes-annonces-liste"></div>
  </div>
</div>

<!-- BARRE BAS -->
<div style="position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:10px 0">
  <button onclick="showPage('accueil')" style="background:none;border:none;font-size:1.5em;cursor:pointer">🏠</button>
  <button onclick="showPage('annonces')" style="background:none;border:none;font-size:1.5em;cursor:pointer">📋</button>
  <button onclick="showPage('publier')" style="background:none;border:none;font-size:1.5em;cursor:pointer">➕</button>
  <button onclick="showPage('profil')" style="background:none;border:none;font-size:1.5em;cursor:pointer">👤</button>
</div>

<div style="height:70px"></div>

<script>
// DONNÉES
let utilisateur = JSON.parse(localStorage.getItem('tn_user') || 'null');
let annonces = JSON.parse(localStorage.getItem('tn_annonces') || '[]');

// Annonces de démonstration
if(annonces.length === 0) {
  annonces = [
    {id:1, titre:"Terrain résidentiel Cocody", lieu:"Cocody, Abidjan", prix:15000000, surface:500, type:"vente", desc:"Beau terrain en zone résidentielle", emoji:"🌿", auteur:"Demo"},
    {id:2, titre:"Terrain commercial Plateau", lieu:"Plateau, Abidjan", prix:25000000, surface:300, type:"vente", desc:"Idéal pour commerce", emoji:"🏢", auteur:"Demo"},
    {id:3, titre:"Terrain à louer Yopougon", lieu:"Yopougon, Abidjan", prix:150000, surface:200, type:"location", desc:"Terrain disponible immédiatement", emoji:"🌱", auteur:"Demo"}
  ];
  localStorage.setItem('tn_annonces', JSON.stringify(annonces));
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if(page === 'annonces' || page === 'accueil') afficherAnnonces();
  if(page === 'profil') afficherProfil();
  if(page === 'mes-annonces') afficherMesAnnonces();
}

function afficherAnnonces() {
  const html = annonces.map(a => carteAnnonce(a)).join('');
  const el = document.getElementById('liste-annonces');
  const el2 = document.getElementById('annonces-accueil');
  if(el) el.innerHTML = html;
  if(el2) el2.innerHTML = annonces.slice(0,2).map(a => carteAnnonce(a)).join('');
}

function carteAnnonce(a) {
  return `<div class="card">
    <div style="font-size:2em">${a.emoji || '🌿'}</div>
    <h3 style="color:#2d5a1b;margin:5px 0">${a.titre}</h3>
    <p style="color:#666">📍 ${a.lieu}</p>
    <p style="color:#666">📐 ${a.surface} m²</p>
    <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
      <strong style="color:#2d5a1b;font-size:1.1em">${Number(a.prix).toLocaleString()} FCFA</strong>
      <span class="badge ${a.type === 'location' ? 'badge-red' : ''}">${a.type === 'vente' ? '🏷️ Vente' : '🔑 Location'}</span>
    </div>
  </div>`;
}

function connecter() {
  const email = document.getElementById('email-login').value;
  const password = document.getElementById('password-login').value;
  if(!email || !password) { alert('Remplissez tous les champs'); return; }
  const users = JSON.parse(localStorage.getItem('tn_users') || '[]');
  const user = users.find(u => u.email === email && u.password === password);
  if(user) {
    utilisateur = user;
    localStorage.setItem('tn_user', JSON.stringify(user));
    alert('Bienvenue ' + user.nom + ' !');
    showPage('accueil');
  } else {
    alert('Email ou mot de passe incorrect');
  }
}

function inscrire() {
  const nom = document.getElementById('nom-inscription').value;
  const email = document.getElementById('email-inscription').value;
  const password = document.getElementById('password-inscription').value;
  if(!nom || !email || !password) { alert('Remplissez tous les champs'); return; }
  const users = JSON.parse(localStorage.getItem('tn_users') || '[]');
  if(users.find(u => u.email === email)) { alert('Email déjà utilisé'); return; }
  const user = {id: Date.now(), nom, email, password};
  users.push(user);
  localStorage.setItem('tn_users', JSON.stringify(users));
  utilisateur = user;
  localStorage.setItem('tn_user', JSON.stringify(user));
  alert('Compte créé ! Bienvenue ' + nom + ' !');
  showPage('accueil');
}

function deconnecter() {
  utilisateur = null;
  localStorage.removeItem('tn_user');
  showPage('accueil');
}

function publierAnnonce() {
  if(!utilisateur) { alert('Connectez-vous d\'abord !'); showPage('connexion'); return; }
  const titre = document.getElementById('titre-annonce').value;
  const lieu = document.getElementById('lieu-annonce').value;
  const prix = document.getElementById('prix-annonce').value;
  const surface = document.getElementById('surface-annonce').value;
  const type = document.getElementById('type-annonce').value;
  const desc = document.getElementById('desc-annonce').value;
  if(!titre || !lieu || !prix || !surface) { alert('Remplissez tous les champs'); return; }
  const annonce = {id: Date.now(), titre, lieu, prix, surface, type, desc, emoji:'🌿', auteur: utilisateur.nom};
  annonces.push(annonce);
  localStorage.setItem('tn_annonces', JSON.stringify(annonces));
  alert('Annonce publiée !');
  showPage('annonces');
}

function afficherProfil() {
  if(!utilisateur) { showPage('connexion'); return; }
  document.getElementById('profil-nom').textContent = utilisateur.nom;
  document.getElementById('profil-email').textContent = utilisateur.email;
}

function afficherMesAnnonces() {
  if(!utilisateur) { showPage('connexion'); return; }
  const mes = annonces.filter(a => a.auteur === utilisateur.nom);
  document.getElementById('mes-annonces-liste').innerHTML = mes.length ? mes.map(a => carteAnnonce(a)).join('') : '<p style="color:#666;text-align:center;margin-top:20px">Vous n\'avez pas encore d\'annonces</p>';
}

function rechercher(terme) {
  const filtres = annonces.filter(a => a.titre.toLowerCase().includes(terme.toLowerCase()) || a.lieu.toLowerCase().includes(terme.toLowerCase()));
  document.getElementById('liste-annonces').innerHTML = filtres.map(a => carteAnnonce(a)).join('');
}

afficherAnnonces();
</script>
</body>
</html>
